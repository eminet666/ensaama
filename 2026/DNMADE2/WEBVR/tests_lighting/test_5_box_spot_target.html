<!DOCTYPE html>
<html>

<head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
    <a-scene>
        <!-- Cube avec un ID pour le cibler -->
        <a-box id="idbox" position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>

        <!-- Sphère -->
        <a-sphere id="idsphere" position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>

        <!-- Cylindre -->
        <a-cylinder id="idcylindre" position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>

        <!-- Plan -->
        <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>

        <!-- Spot extérieur pointant vers le cube -->
        <a-entity position="-3 3 1" 
            light="type: spot;
                   color: #FFFFFF;
                   intensity: 20;
                   distance: 10;
                   angle: 10;
                   penumbra: 0.3;
                   target: #idsphere"></a-entity>

        <!-- Fond de scène -->
        <a-sky color="#222222"></a-sky>
    </a-scene>
</body>

</html>
