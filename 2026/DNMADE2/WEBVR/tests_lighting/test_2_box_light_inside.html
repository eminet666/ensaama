<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Cube bleu lumineux sur un plan gris</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
    <a-scene background="color: #111111">
        <!-- Plan gris -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#555555"></a-plane>

        <!-- Cube bleu qui émet de la lumière -->
        <a-box position="0 0.5 -3" color="#0066FF" scale="0.5 0.5 0.5"
            light="type: point; intensity: 2; distance: 10; color: #0066FF"></a-box>

        <!-- Lumière ambiante pour adoucir l'environnement -->
        <a-light type="ambient" color="#333333" intensity="0.2"></a-light>
    </a-scene>
</body>

</html>
