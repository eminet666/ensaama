<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Cube émissif (effet radioactif)</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #000000">
      <!-- Plan gris -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#555555"></a-plane>

      <!-- Cube avec matériau émissif -->
      <a-box
        position="0 0.5 -3" scale="0.5 0.5 0.5"
        width="1" height="1" depth="1"
        material="shader: standard;
                  emissive: #0066FF;
                  emissiveIntensity: 2;
                  roughness: 0.8;
                  metalness: 0.1"
      ></a-box>

      <!-- Lumière ambiante pour éviter un environnement trop sombre -->
      <a-light type="ambient" color="#222222" intensity="0.1"></a-light>
    </a-scene>
  </body>
</html>
